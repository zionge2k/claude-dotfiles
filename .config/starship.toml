# Starship prompt config — Catppuccin Latte palette
palette = "catppuccin_latte"

format = """
$directory\
$git_branch\
$git_status\
$java\
$nodejs\
$python\
$cmd_duration\
$line_break\
$character"""

[directory]
style = "bold lavender"
truncation_length = 3

[git_branch]
symbol = " "
style = "bold mauve"

[git_status]
style = "bold maroon"

[java]
symbol = " "
style = "bold red"

[nodejs]
symbol = " "
style = "bold green"

[python]
symbol = " "
style = "bold yellow"

[cmd_duration]
min_time = 2_000
style = "bold overlay0"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[palettes.catppuccin_latte]
rosewater = "#dc8a78"
flamingo = "#dd7878"
pink = "#ea76cb"
mauve = "#8839ef"
red = "#d20f39"
maroon = "#e64553"
peach = "#fe640b"
yellow = "#df8e1d"
green = "#40a02b"
teal = "#179299"
sky = "#04a5e5"
sapphire = "#209fb5"
blue = "#1e66f5"
lavender = "#7287fd"
text = "#4c4f69"
subtext1 = "#5c5f77"
subtext0 = "#6c6f85"
overlay2 = "#7c7f93"
overlay1 = "#8c8fa1"
overlay0 = "#9ca0b0"
surface2 = "#acb0be"
surface1 = "#bcc0cc"
surface0 = "#ccd0da"
base = "#eff1f5"
mantle = "#e6e9ef"
crust = "#dce0e8"
