# tmux configuration - adapted from msbaek/dotfiles
# After reloading, kill the tmux session for changes to take effect

# Terminal settings
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Prefix key: Ctrl+a
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Split panes with | and -
unbind %
bind | split-window -h
unbind '"'
bind - split-window -v

# Reload config
unbind r
bind r source-file ~/.tmux.conf\; display-message "Config reloaded."

# Session list sorted by time
bind s choose-tree -Zs -O time

# Windows start at index 1
set -g base-index 1

# Status bar at top
set -g status-position top

# Pane resizing (repeatable with leader key)
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# Dashboard: monitor all windows at a glance (prefix + D)
bind D display-popup -E -w 90% -h 85% "~/.tmux/scripts/tmux-dashboard.sh"

# Prevent automatic window renaming
set -g allow-rename off

# image.nvim support
set -gq allow-passthrough on

# Window activity monitoring for Claude Code parallel sessions
set -g monitor-activity on
set -g activity-action other
set -g visual-activity off

# Vim navigation in copy mode
set -g mode-keys vi
set -g mouse on
set-window-option -g mode-keys vi

# Copy mode bindings
bind y copy-mode
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# Reduce ESC delay for Neovim
set -sg escape-time 10

# Neovim focus events
set -g focus-events on

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'

# Catppuccin theme (pinned to v0.3.0)
set -g @plugin 'catppuccin/tmux#v0.3.0'
set -g @catppuccin_flavor 'latte'

set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator ""
set -g @catppuccin_window_middle_separator ""
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_modules_right "null"
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_status_fill "all"
set -g @catppuccin_status_default "on"

# Resurrect & Continuum
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# Initialize TPM (keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'

# Yazi support
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Extended keys support (비활성화)
# Warp 터미널이 Shift+Enter를 자체 입력 레이어에서 가로채므로
# extended-keys 설정으로는 해결 불가. \ + Enter 사용 권장.
